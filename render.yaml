services:
  - type: web
    name: ai-investor-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: AUTH_ENABLED
        value: "true"
      - key: ENABLE_DOCS
        value: "false"
      - key: AUTO_INIT_DB
        value: "true"
      - key: LOG_JSON
        value: "true"
      - key: REALTIME_SCAN_ENABLED
        value: "true"
      - key: REALTIME_SCAN_INTERVAL_SECONDS
        value: "120"
      - key: EXTERNAL_API_TIMEOUT_SECONDS
        value: "15"
      - key: CORS_ORIGINS
        sync: false
      - key: TRUSTED_HOSTS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD_HASH
        sync: false

  - type: web
    name: ai-investor-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    autoDeploy: true
    envVars:
      - key: NEXT_SERVER_API_URL
        sync: false
      - key: NEXT_PUBLIC_API_URL
        value: ""
      - key: NEXT_PUBLIC_WS_URL
        sync: false
      - key: NEXT_PUBLIC_ENABLE_ALERT_POLLING
        value: "true"
