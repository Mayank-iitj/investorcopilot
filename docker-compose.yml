services:
  # ── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: investor
      POSTGRES_PASSWORD: investor_secret
      POSTGRES_DB: investor_copilot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U investor"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://investor:investor_secret@postgres:5432/investor_copilot
      REDIS_URL: redis://redis:6379/0
      APP_NAME: AI Investor Copilot
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      LOG_JSON: "true"
      ENABLE_DOCS: "false"
      AUTO_INIT_DB: "false"
      CORS_ORIGINS: http://localhost:3000
      TRUSTED_HOSTS: localhost,127.0.0.1
      AUTH_ENABLED: "true"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "60"
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      EXTERNAL_API_TIMEOUT_SECONDS: "15"
      RATE_LIMIT_DEFAULT: 120/minute
      RATE_LIMIT_SENSITIVE: 20/minute
      ENABLE_METRICS: "true"
      ENABLE_SENTRY: "false"
      SENTRY_DSN: ""
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

  # ── Frontend (Next.js) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ""
      NEXT_SERVER_API_URL: http://backend:8000
      NEXT_PUBLIC_AUTH_TOKEN: ${NEXT_PUBLIC_AUTH_TOKEN:-}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  backend-data:
